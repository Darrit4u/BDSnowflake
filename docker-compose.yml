services:
  postgres:
    image: postgres:latest
    container_name: lab1_postgres
    environment:
      POSTGRES_DB: lab1
      POSTGRES_USER: lab1_user
      POSTGRES_PASSWORD: lab1_password
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
      - './исходные данные:/csv'
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./import_mock.sql:/docker-entrypoint-initdb.d/02_import_mock.sql
      - ./dml.sql:/docker-entrypoint-initdb.d/03_dml.sql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lab1_user -d lab1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    driver: local